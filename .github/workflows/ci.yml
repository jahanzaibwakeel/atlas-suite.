name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  DATABASE_URL: "postgresql://atlas:atlas_dev_password@localhost:5432/atlas_suite?schema=public"
  REDIS_URL: "redis://localhost:6379"
  JWT_SECRET: "ci-jwt-secret-at-least-32-characters"
  JWT_ACCESS_TOKEN_TTL: "15m"
  JWT_REFRESH_TOKEN_TTL_DAYS: "30"
  EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: "60"
  PASSWORD_RESET_TOKEN_TTL_MINUTES: "15"
  QUEUE_PREFIX: "atlas"
  TRUST_PROXY: "false"
  RATE_LIMIT_FAIL_OPEN: "true"
  UPLOAD_DIR: "uploads"
  MAX_UPLOAD_BYTES: "5242880"
  PORT: "4000"
  FRONTEND_URL: "http://localhost:5173"
  NEXT_PUBLIC_API_URL: "http://localhost:4000/api"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma -- validate

      - name: Run backend tests
        run: npm run test

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build backend production image
        run: docker build -f backend/Dockerfile.prod -t atlas-backend:ci backend

      - name: Build frontend production image
        run: docker build -f frontend/Dockerfile.prod --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000/api -t atlas-frontend:ci frontend
