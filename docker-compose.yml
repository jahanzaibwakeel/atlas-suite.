services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: change-me-in-local-development
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - fieldops_sqlite:/app/data
    command: sh -c "npm run migrate && npm run seed && npm run dev"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev

volumes:
  fieldops_sqlite:
